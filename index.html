<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {

      appId: "fe4808f5-44cf-44dc-8abd-31cbea71d8c4",
    });

</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Vital">
<meta name="theme-color" content="#f3f0e9">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="app-icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="manifest" href="manifest.json">
<title>Vital</title>
<style>
:root{
  --canvas:#f3f0e9; --card:#fbf9f4; --card-2:#e7e2d7; --tile-2:#efeade;
  --line:rgba(27,26,21,.10); --line-2:rgba(27,26,21,.20);
  --ink:#1b1a15; --ink-2:#726d61; --ink-3:#a9a396;
  --brand:#1f5c40; --brand-ink:#f5f2ea; --brand-dim:rgba(31,92,64,.10);
  /* strict monochrome data ramp — accent for the primary metric only */
  --protein:#1f5c40; --carb:#4c483e; --fat:#847e71; --fibre:#6a6558; --water:#5f7a6e;
  --danger:#8a3b32; --good:#1f5c40; --warn:#8a7538; --accent:#1f5c40;
  --sheet:#fbf9f4; --blur:saturate(140%) blur(18px);
  --shadow:0 1px 0 var(--line); --shadow-sm:none;
  --r:20px; --r-sm:15px; --r-xs:11px;
  --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
  --tab-h:calc(76px + env(safe-area-inset-bottom));
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,system-ui,sans-serif;
  --serif:ui-serif,"New York","Iowan Old Style","Palatino Linotype","Palatino",Georgia,"Times New Roman",serif;
}
html[data-theme="dark"]{
  --canvas:#141310; --card:#1d1c17; --card-2:#2b2920; --tile-2:#26241d;
  --line:rgba(245,242,234,.10); --line-2:rgba(245,242,234,.22);
  --ink:#f1eee6; --ink-2:#a9a396; --ink-3:#6f6a5d;
  --brand:#5b9c78; --brand-ink:#0f120e; --brand-dim:rgba(91,156,120,.14);
  --protein:#5b9c78; --carb:#c8c2b3; --fat:#8f897b; --fibre:#a9a396; --water:#7ea394;
  --danger:#c07268; --good:#5b9c78; --warn:#c0a768; --accent:#5b9c78;
  --sheet:#1d1c17; --shadow:0 1px 0 var(--line);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;overscroll-behavior-y:none}
body{font-family:var(--sans);background:var(--canvas);color:var(--ink);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-size:15px;line-height:1.5;letter-spacing:-.006em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
.serif{font-family:var(--serif);font-weight:400;letter-spacing:-.01em}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
::-webkit-scrollbar{width:0;height:0}
a{color:var(--brand)}
svg.ic{width:1em;height:1em;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;vertical-align:-.14em}

#app{max-width:480px;margin:0 auto;min-height:100%;position:relative}
.screen{display:none;padding:calc(var(--safe-t) + 14px) 18px calc(var(--tab-h) + 24px);animation:fade .45s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001s!important;transition-duration:.001s!important}}

/* header */
.head{display:flex;align-items:flex-end;justify-content:space-between;margin:8px 2px 24px;gap:12px}
.head .hi{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3)}
.head h1{font-family:var(--serif);font-weight:400;font-size:34px;margin:8px 0 0;letter-spacing:-.02em;line-height:1}
.head .sub{font-size:12.5px;color:var(--ink-2);margin-top:6px}
.iconbtn{width:44px;height:44px;border-radius:50%;border:1px solid var(--line);display:grid;place-items:center;font-size:18px;color:var(--ink-2);transition:.15s}
.iconbtn:active{transform:scale(.9)}

/* layout */
.bento{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.span2{grid-column:span 2}
.tile{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px;position:relative;overflow:hidden}
.tile.tap{transition:transform .14s}.tile.tap:active{transform:scale(.98)}
.tile.ink{background:var(--ink);color:var(--canvas);border-color:transparent}
.tile.accent{background:var(--brand);color:var(--brand-ink);border-color:transparent}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3)}
.tile.ink .eyebrow,.tile.accent .eyebrow{color:rgba(245,242,234,.55)}
.huge{font-family:var(--serif);font-weight:400;font-size:56px;letter-spacing:-.02em;line-height:.95;margin-top:12px}
.huge small{font-family:var(--sans);font-size:16px;font-weight:600;letter-spacing:0;color:var(--ink-3)}
.tile.ink .huge small{color:rgba(245,242,234,.6)}
.midnum{font-family:var(--serif);font-weight:400;font-size:34px;letter-spacing:-.015em;line-height:1;margin-top:10px}
.midnum small{font-family:var(--sans);font-size:13px;font-weight:600;color:var(--ink-3)}
.tlabel{font-size:12px;color:var(--ink-2);margin-top:8px}
.tile.ink .tlabel{color:rgba(245,242,234,.66)}

/* rings */
.ring-wrap{position:relative;flex:0 0 auto;display:inline-block}
.ring-center{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.ring-center .big{font-family:var(--serif);font-weight:400;font-size:26px;line-height:1}
.ring-center .lbl{font-size:8.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-top:4px}

/* macro bars — monochrome, accent only for the primary */
.macro-row{display:flex;align-items:baseline;gap:10px;margin-bottom:7px}
.macro-row .nm{font-size:12px;font-weight:600;color:var(--ink-2);flex:1;letter-spacing:.01em}
.macro-row .vl{font-size:12.5px;font-weight:600;color:var(--ink)}
.macro-bar{height:3px;border-radius:0;background:var(--card-2);overflow:hidden;margin:0 0 15px}
.tile.ink .macro-bar{background:rgba(245,242,234,.18)}
.macro-bar>i{display:block;height:100%;background:var(--ink-2);transition:width 1s cubic-bezier(.2,.8,.2,1)}

/* chips */
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;margin:0 -2px}
.chip{flex:0 0 auto;padding:10px 16px;border-radius:99px;border:1px solid var(--line);background:transparent;
  font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;white-space:nowrap;transition:.14s;color:var(--ink-2)}
.chip:active{transform:scale(.95)}
.chip.on{background:var(--ink);color:var(--canvas);border-color:transparent}

/* section head */
.sec{display:flex;align-items:baseline;justify-content:space-between;margin:26px 2px 14px}
.sec .a{font-size:12px;font-weight:700;color:var(--brand);letter-spacing:.02em}

/* lists */
.list{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:4px 18px;margin-bottom:12px}
.item{display:flex;align-items:center;gap:14px;padding:15px 0;border-top:1px solid var(--line)}
.item:first-child{border-top:none}
.item .em{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);display:grid;place-items:center;font-size:15px;color:var(--ink-2);flex:0 0 auto}
.item .mid{flex:1;min-width:0}
.item .mid .h{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.item .mid .s{font-size:12px;color:var(--ink-2);margin-top:2px}
.item .rt{text-align:right;flex:0 0 auto}
.item .rt .k{font-family:var(--serif);font-size:17px}.item .rt .u{font-size:9px;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.item .x{width:28px;height:28px;border-radius:50%;border:1px solid var(--line);display:grid;place-items:center;color:var(--ink-3);font-size:13px;flex:0 0 auto}
.vbtn{display:inline-flex;align-items:center;gap:5px;padding:8px 13px;border-radius:99px;border:1px solid var(--line);
  color:var(--ink);font-size:12px;font-weight:600;flex:0 0 auto;transition:.14s}
.vbtn:active{transform:scale(.93)}

/* coach tile */
.coach-card{background:var(--ink);color:var(--canvas);border-radius:var(--r);padding:22px;margin-bottom:12px}
.coach-card .badge{display:inline-flex;align-items:center;gap:7px;font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(245,242,234,.55);margin-bottom:12px}
.coach-card .msg{font-family:var(--serif);font-weight:400;font-size:19px;line-height:1.45}
.coach-card .msg b{font-weight:400;font-style:italic}
.rec{display:flex;gap:14px;align-items:flex-start;padding:15px 0;border-top:1px solid var(--line)}
.rec:first-child{border-top:none}
.rec .ic{width:30px;height:30px;flex:0 0 auto;display:grid;place-items:center;color:var(--brand);font-size:15px;margin-top:1px}
.rec .tx{flex:1}.rec .tx .h{font-size:14px;font-weight:600}.rec .tx .s{font-size:12.5px;color:var(--ink-2);margin-top:3px;line-height:1.5}

/* meals */
.meal-block{margin-bottom:16px}
.meal-head{display:flex;align-items:baseline;justify-content:space-between;margin:4px 2px 10px}
.meal-head .nm{font-family:var(--serif);font-size:19px}
.meal-head .kc{font-size:12px;color:var(--ink-2);font-weight:600}
.add-slot{display:flex;align-items:center;justify-content:center;gap:8px;padding:15px;border-top:1px solid var(--line);
  color:var(--ink-2);font-size:13px;font-weight:600}

/* stats */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:18px}
.stat .l{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3)}
.stat .v{font-family:var(--serif);font-size:30px;margin-top:12px;line-height:1}
.stat .v small{font-family:var(--sans);font-size:13px;color:var(--ink-2);font-weight:600}
.stat .d{font-size:12px;font-weight:600;margin-top:8px;color:var(--ink-2)}
.stat .d.up{color:var(--good)}.stat .d.down{color:var(--danger)}
.chart-wrap{width:100%;overflow:hidden}svg.chart{width:100%;display:block}

/* buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:16px;border-radius:14px;
  font-size:15px;font-weight:600;background:transparent;border:1px solid var(--line-2);color:var(--ink);transition:transform .12s}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--ink);color:var(--canvas);border-color:transparent}
.btn.accent{background:var(--brand);color:var(--brand-ink);border-color:transparent}
.btn.ink{background:var(--ink);color:var(--canvas);border-color:transparent}
.btn.ghost{background:transparent}
.btn.danger{border-color:var(--danger);color:var(--danger)}
.btn.sm{padding:12px;font-size:14px}
.btn-row{display:flex;gap:10px;margin-bottom:12px}

/* sheets */
.scrim{position:fixed;inset:0;background:rgba(15,12,6,.4);z-index:80;opacity:0;pointer-events:none;transition:opacity .3s}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:90;max-width:480px;margin:0 auto;background:var(--sheet);
  border-radius:26px 26px 0 0;border-top:1px solid var(--line);box-shadow:0 -20px 50px -30px rgba(0,0,0,.4);transform:translateY(101%);
  transition:transform .42s cubic-bezier(.2,.9,.25,1);max-height:93vh;display:flex;flex-direction:column;padding-bottom:var(--safe-b)}
.sheet.show{transform:translateY(0)}
.sheet .grab{width:38px;height:4px;border-radius:99px;background:var(--line-2);margin:12px auto 4px}
.sheet .sh-head{display:flex;align-items:center;justify-content:space-between;padding:10px 24px 18px}
.sheet .sh-head h3{font-family:var(--serif);font-weight:400;font-size:23px;margin:0;letter-spacing:-.01em}
.sheet .sh-head .cls{font-size:14px;font-weight:600;color:var(--brand)}
.sheet .sh-body{padding:4px 22px 28px;overflow-y:auto;-webkit-overflow-scrolling:touch}

.field{margin-bottom:15px}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-bottom:9px}
.field input,.field select,.field textarea{width:100%;padding:15px;border-radius:12px;background:transparent;
  border:1px solid var(--line-2);color:var(--ink);outline:none;transition:border .2s;font-weight:500}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand)}
.field .row{display:flex;gap:10px}
.seg{display:flex;border:1px solid var(--line);border-radius:12px;padding:4px;gap:2px}
.seg button{flex:1;padding:11px;border-radius:9px;font-size:13px;font-weight:600;color:var(--ink-2);transition:.2s}
.seg button.on{background:var(--ink);color:var(--canvas)}
.pill-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pill-opt{padding:16px;border-radius:13px;border:1px solid var(--line-2);background:transparent;text-align:left;transition:.15s}
.pill-opt.on{border-color:var(--brand);background:var(--brand-dim)}
.pill-opt .pt{font-size:14px;font-weight:600}
.pill-opt .ps{font-size:11.5px;color:var(--ink-2);margin-top:3px}
.sr{max-height:46vh;overflow-y:auto;margin-top:4px}
.sr .list{border:none;background:transparent;padding:0}
.sr .item{cursor:pointer}

/* card block (in sheets) */
.card{background:transparent;border:1px solid var(--line);border-radius:var(--r-sm);padding:17px;margin-bottom:13px}
.card-h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:13px}
.card-h .t{font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3)}
.card-h .a{font-size:13px;color:var(--brand);font-weight:700}

/* floating nav */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:60;display:flex;justify-content:center;padding:0 18px calc(16px + var(--safe-b));pointer-events:none}
.nav-in{pointer-events:auto;display:flex;align-items:center;gap:2px;background:var(--card);border:1px solid var(--line);border-radius:99px;
  padding:7px;box-shadow:0 12px 34px -18px rgba(0,0,0,.4);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur)}
.nav-item{width:56px;height:50px;border-radius:99px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--ink-3);font-size:9px;font-weight:600;letter-spacing:.04em;transition:.18s}
.nav-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.nav-item.on{background:var(--ink);color:var(--canvas)}
.nav-fab{width:52px;height:52px;border-radius:50%;background:var(--brand);color:var(--brand-ink);display:grid;place-items:center;margin:0 5px;transition:transform .15s}
.nav-fab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round}
.nav-fab:active{transform:scale(.9)}

/* toast */
#toast{position:fixed;left:50%;bottom:calc(var(--tab-h) + 16px);transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--canvas);padding:13px 22px;border-radius:99px;font-size:13.5px;font-weight:600;
  z-index:120;opacity:0;pointer-events:none;transition:.3s;max-width:88vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* misc */
.spacer{height:8px}.muted{color:var(--ink-3);font-size:12.5px}.center{text-align:center}
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
.quick{background:transparent;border:1px solid var(--line);border-radius:var(--r-sm);padding:16px 6px;text-align:center;transition:.14s;color:var(--ink-2)}
.quick:active{transform:scale(.93)}.quick .ic{font-size:20px;color:var(--ink)}.quick .tx{font-size:10.5px;font-weight:600;margin-top:9px;letter-spacing:.02em}
.badge-pro{font-size:9.5px;font-weight:700;letter-spacing:.1em;padding:4px 10px;border-radius:99px;border:1px solid var(--brand);color:var(--brand);text-transform:uppercase}
.empty{text-align:center;padding:34px 12px;color:var(--ink-3)}.empty .e-ic{font-size:26px;margin-bottom:12px;color:var(--ink-2)}
.loader{display:inline-block;width:15px;height:15px;border:2px solid var(--line-2);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.typing{display:inline-flex;gap:4px}.typing i{width:6px;height:6px;border-radius:50%;background:var(--ink-3);animation:blink 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

/* chat */
.chat{display:flex;flex-direction:column;gap:10px}
.bubble{max-width:82%;padding:14px 17px;border-radius:18px;font-size:15px;line-height:1.55}
.bubble.ai{background:var(--card);border:1px solid var(--line);border-bottom-left-radius:6px;align-self:flex-start}
.bubble.me{background:var(--ink);color:var(--canvas);border-bottom-right-radius:6px;align-self:flex-end}
.chat-input{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;padding:12px 16px calc(12px + var(--safe-b));
  background:color-mix(in srgb,var(--canvas) 85%,transparent);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);display:flex;gap:9px;z-index:70}
.chat-input input{flex:1;padding:14px 18px;border-radius:99px;background:var(--card);border:1px solid var(--line);color:var(--ink);outline:none}
.chat-input .snd{width:46px;height:46px;border-radius:50%;background:var(--brand);color:var(--brand-ink);display:grid;place-items:center;font-size:18px;flex:0 0 auto}

/* onboarding */
#onboard{position:fixed;inset:0;z-index:200;background:var(--canvas);display:none;flex-direction:column;
  padding:calc(var(--safe-t) + 40px) 30px calc(var(--safe-b) + 24px);overflow-y:auto}
#onboard.show{display:flex}
.ob-logo{width:64px;height:64px;border-radius:50%;background:var(--brand);color:var(--brand-ink);display:grid;place-items:center;font-family:var(--serif);font-size:32px;margin-bottom:26px}
#onboard h2{font-family:var(--serif);font-weight:400;font-size:32px;letter-spacing:-.02em;margin:0 0 10px;line-height:1.1}
#onboard p.sub{color:var(--ink-2);font-size:15px;margin:0 0 28px}
.ob-step{display:none}.ob-step.on{display:block;animation:fade .35s}
</style>
</head>
<body>
<div id="app"></div>
<nav class="nav" id="tabbar"></nav>
<div class="scrim" id="scrim" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <div class="sh-head"><h3 id="sheetTitle">Title</h3><button class="cls" onclick="closeSheet()">Done</button></div>
  <div class="sh-body" id="sheetBody"></div>
</div>
<div id="toast"></div>
<div id="onboard"></div>
<script>
/* =========================================================================
   VITAL — AI Coach  (single-file, offline-first prototype)
   Part 1: databases, state, persistence, calorie/macro/training engine
   ========================================================================= */
'use strict';

/* ------------------------------ FOOD DATABASE ------------------------------
   Each entry: macros for one "serving". qty multiplies everything.
   fields: kcal, p(rotein), c(arbs), f(at), fib(re)   grams unless noted        */
const FOODS = [
  // --- Egyptian staples ---
  {id:'baladi', name:'Baladi bread', emoji:'', serv:'1 loaf (90g)', kcal:250, p:8, c:50, f:1.5, fib:6, tag:'egy'},
  {id:'koshary', name:'Koshary', emoji:'', serv:'1 medium bowl', kcal:520, p:16, c:98, f:8, fib:9, tag:'egy'},
  {id:'foul', name:'Foul medames', emoji:'', serv:'1 cup', kcal:280, p:18, c:40, f:6, fib:14, tag:'egy'},
  {id:'taameya', name:'Taameya (falafel)', emoji:'', serv:'4 pieces', kcal:330, p:13, c:30, f:18, fib:8, tag:'egy'},
  {id:'molokhia', name:'Molokhia w/ chicken', emoji:'', serv:'1 bowl + 100g chicken', kcal:310, p:32, c:12, f:14, fib:5, tag:'egy'},

/* ============================ ENGINE: ENERGY ============================= */
function bmr(p=S.profile){
  // Mifflin-St Jeor
  const base = 10*p.weight + 6.25*p.height - 5*p.age;
  return Math.round(p.sex==='male' ? base+5 : base-161);
}
function tdee(p=S.profile){ return Math.round(bmr(p)*p.activity); }

const GOAL_ADJ = { // deficit/surplus as a FRACTION of maintenance (TDEE) + protein g/kg
  fatloss:{slow:-0.12, moderate:-0.18, aggressive:-0.22, pKg:2.2, label:'Fat loss'},
  cut:    {slow:-0.25, moderate:-0.30, aggressive:-0.35, pKg:2.6, label:'Aggressive cut'},
  muscle: {slow:0.08,  moderate:0.12,  aggressive:0.16,  pKg:2.0, label:'Muscle gain'},
  maintain:{slow:0, moderate:0, aggressive:0, pKg:1.8, label:'Maintain'},
};
function calorieFloor(p=S.profile){ return Math.max(p.sex==='male'?1500:1200, Math.round(bmr(p)*0.8)); }
function computeTargets(){
  const g=S.goal, p=S.profile, adj=GOAL_ADJ[g.type]||GOAL_ADJ.maintain;
  const maint=tdee(p), floor=calorieFloor(p);
  let kcal;
  if(g.override && g.override>0){ kcal=Math.round(g.override); }
  else { kcal=Math.round(maint*(1+(adj[g.pace]||0))); }
  kcal=Math.max(kcal, floor); // never below a safe floor
  // protein capped so it can't exceed 40% of calories on very low intakes
  let prot=Math.round(Math.min(adj.pKg*p.weight, kcal*0.40/4));
  let fat =Math.max(Math.round(kcal*0.25/9), Math.round(0.6*p.weight));
  let carb=Math.round((kcal - prot*4 - fat*9)/4);
  if(carb<0){ fat=Math.round(0.6*p.weight); carb=Math.max(0,Math.round((kcal - prot*4 - fat*9)/4)); }
  const fib=Math.min(45, Math.round(kcal/1000*14));
  const water=Math.round(p.weight*35 + 500);
  S.targets={kcal, p:prot, c:carb, f:fat, fib, water, steps:S.targets.steps||10000,
             maint, floor, deficit:maint-kcal};
  computeTargetDate(); save();
  return S.targets;
}
function computeTargetDate(){
  const g=S.goal, p=S.profile;
  const diff = p.weight - (g.targetWeight||p.weight);       // kg to lose (+) or gain (-)
  const daily = tdee(p) - S.targets.kcal;                   // deficit per day
  if(Math.abs(diff)<0.2 || Math.abs(daily)<50){ g.targetDate=null; return; }
  const kcalPerKg = 7700;
  const days = Math.abs(diff*kcalPerKg/daily);
  const dt = new Date(); dt.setDate(dt.getDate()+Math.round(days));
  g.targetDate = isoDate(dt);
}

/* ============================ ENGINE: TOTALS ============================= */
function foodMacros(entry){
  const base = FOODS.find(f=>f.id===entry.id) || entry.custom;
  const q = entry.qty||1;
  if(!base) return {kcal:0,p:0,c:0,f:0,fib:0};
  return {kcal:base.kcal*q, p:base.p*q, c:base.c*q, f:base.f*q, fib:(base.fib||0)*q};
}
function dayTotals(date=TODAY){
  const l=dayLog(date); const t={kcal:0,p:0,c:0,f:0,fib:0};
  l.foods.forEach(e=>{const m=foodMacros(e); t.kcal+=m.kcal;t.p+=m.p;t.c+=m.c;t.f+=m.f;t.fib+=m.fib;});
  t.water=l.water||0; t.steps=l.steps||0;
  t.burned=(l.cardio||[]).reduce((a,c)=>a+c.kcal,0);
  for(const k in t) t[k]=Math.round(t[k]);
  return t;
}

/* ============================ ENGINE: MEAL PLAN ========================== */
const MEAL_NAMES=['Breakfast','Lunch','Dinner','Snack','Pre-workout','Post-workout'];
const DIET_FILTER={
  balanced:()=>true,
  highprotein:f=>f.p/Math.max(f.kcal,1)>0.09 || f.tag==='protein',
  lowcarb:f=>f.c<25,
  vegetarian:f=>!['protein'].includes(f.tag)||['lentils','egg','eggwhite','greek_yog','whey','cottage'].includes(f.id),
};
function pickMeal(targetKcal, targetP, diet){
  const filt = DIET_FILTER[diet]||DIET_FILTER.balanced;
  const pool = FOODS.filter(f=>filt(f) && f.tag!=='fast' && f.tag!=='veg');
  const prot = pool.filter(f=>f.p/Math.max(f.kcal,1)>0.08).sort((a,b)=>b.p-a.p);
  const carb = pool.filter(f=>f.tag==='carb'||f.tag==='egy');
  const meal=[]; let kc=0,pr=0;
  // 1 protein anchor
  const P=prot[Math.floor(Math.random()*Math.min(5,prot.length))]||pool[0];
  if(P){meal.push({id:P.id,qty:1}); kc+=P.kcal; pr+=P.p;}
  // veg for volume (cheap calories first)
  const V=FOODS.filter(f=>f.tag==='veg'); const vv=V[Math.floor(Math.random()*V.length)];
  if(vv){meal.push({id:vv.id,qty:1}); kc+=vv.kcal; pr+=vv.p;}
  // fill carbs toward target without overshooting by more than ~8%
  let guard=0;
  while(guard++<4){
    const C=carb[Math.floor(Math.random()*carb.length)]; if(!C)break;
    if(kc + C.kcal > targetKcal*1.08) break;
    meal.push({id:C.id,qty:1}); kc+=C.kcal; pr+=C.p;
  }
  // if short on protein, top up whey/greek yoghurt
  if(pr < targetP*0.8){ const boost=FOODS.find(f=>f.id==='whey')||FOODS.find(f=>f.id==='greek_yog');
    if(boost && kc+boost.kcal<=targetKcal*1.12){ meal.push({id:boost.id,qty:1}); kc+=boost.kcal; pr+=boost.p; } }
  return {items:meal, kcal:Math.round(kc), p:Math.round(pr)};
}
function generateMealPlan(){
  const t=S.targets, n=S.goal.meals||4, diet=S.goal.diet;
  const per=t.kcal/n, perP=t.p/n;
  const plan=[];
  for(let i=0;i<n;i++){
    const nm = n<=3 ? ['Breakfast','Lunch','Dinner'][i] : MEAL_NAMES[i]||('Meal '+(i+1));
    plan.push({name:nm, ...pickMeal(per,perP,diet)});
  }
  return plan;
}
function substitute(item){
  const cur=FOODS.find(f=>f.id===item.id); if(!cur) return item;
  const cands=FOODS.filter(f=>f.tag===cur.tag && f.id!==cur.id && Math.abs(f.kcal-cur.kcal)<cur.kcal*0.4);
  const pick=cands[Math.floor(Math.random()*cands.length)];
  if(!pick) return item;
  const qty=Math.max(0.5, Math.round((cur.kcal/pick.kcal)*2)/2);
  return {id:pick.id, qty};
}

function generateWorkout(splitKey, days){
  const sp=SPLITS[splitKey]||SPLITS.ppl;
  return {split:sp.name, key:splitKey, days, startDate:isoDate(), created:isoDate()};
}
function currentBlock(w){
  const weeks=Math.floor((new Date(TODAY)-new Date(w.startDate||TODAY))/6048e5);
  const idx=(((Math.floor(weeks/4))%BLOCK_THEMES.length)+BLOCK_THEMES.length)%BLOCK_THEMES.length;
  const weekInBlock=(((weeks%4)+4)%4)+1;
  return {idx, theme:BLOCK_THEMES[idx], weekInBlock, totalWeeks:Math.max(0,weeks)};
}
function buildSession(w, dayIdx){
  const sp=SPLITS[w.key]||SPLITS.ppl;
  const cat=sp.seq[dayIdx % sp.seq.length];
  const blk=currentBlock(w), th=blk.theme;
  let ex=(EX[cat]||EX.full).map(([name,sets,reps])=>({name, sets, reps: th.reps||reps}));
  if(th.emphasis) th.emphasis.forEach(k=>(EMPHASIS[k]||[]).slice(0,1).forEach(([n,s,r])=>ex.push({name:n,sets:s,reps:r,acc:true})));
  return {day:dayIdx+1, focus:cat, title:capitalize(cat), block:blk, rest:REST[cat]||'90s',
          exercises:ex, mobility:MOBILITY[th.mob]||MOBILITY.foundational};
}

/* ============================ ENGINE: CARDIO ============================= */
function cardioBurn(activity, minutes){
  const met=(CARDIO[activity]||{}).met||5;
  return Math.round(met*3.5*S.profile.weight/200*minutes);
}
function cardioForGoal(fatKg, weeks){
  const totalKcal=fatKg*7700;
  const perWeek=totalKcal/weeks;
  const fromDiet=(tdee()-S.targets.kcal)*7;    // weekly deficit already from diet
  const need=Math.max(0, perWeek-fromDiet);    // remaining to burn via cardio
  const runMin=Math.round(need/cardioBurn('running',1))||0;
  const walkMin=Math.round(need/cardioBurn('walking',1))||0;
  return {perWeek:Math.round(perWeek), fromDiet:Math.round(fromDiet), need:Math.round(need),
          runMin, walkMin};
}

  if(rec && rec.score!=null){
    if(rec.score<34) recs.push({ic:'',h:`Recovery ${rec.score}% — back off`,s:`Low recovery. Swap today's lift for mobility or a walk, and eat nearer maintenance (~${g.maint||tdee()} kcal) to recover.`});
    else if(rec.score<67) recs.push({ic:'',h:`Recovery ${rec.score}% — train smart`,s:`Green-light to train, but cap intensity, hit ${(g.water/1000).toFixed(1)}L water and aim for 7–8h sleep tonight.`});
    else recs.push({ic:'',h:`Recovery ${rec.score}% — primed`,s:`Strong recovery. Push your main lifts today and chase progressive overload.`});
  }
  if(remP>25) recs.push({ic:'',h:`Eat ${remP}g more protein`,s:`You're ${remP}g under your ${g.p}g target — a shake or 150g chicken closes the gap.`});
  if(remW>500) recs.push({ic:'',h:`Drink ${(remW/1000).toFixed(1)}L more water`,s:`Aim for ${(g.water/1000).toFixed(1)}L today to stay hydrated and control appetite.`});
  if(remS>2000 && new Date().getHours()>=14) recs.push({ic:'',h:`Walk ${Math.round(remS/1000)}k more steps`,s:`A ${Math.round(remS/120)}-min walk gets you to ${g.steps.toLocaleString()} steps.`});
  if(S.goal.type==='fatloss'||S.goal.type==='cut'){
    if(remK>400 && new Date().getHours()>=19) recs.push({ic:'',h:`You're ${remK} kcal under target`,s:`Have a light protein snack (${Math.round(remK/4)}g protein equiv.) so recovery isn't compromised.`});
    if(remK<-150) recs.push({ic:'',h:`${Math.abs(remK)} kcal over target`,s:`Add a 30-min walk (~${cardioBurn('walking',30)} kcal) to stay on deficit.`});
  } else {
    if(remK>500) recs.push({ic:'',h:`Eat ${remK} kcal more to grow`,s:`You're building muscle — hitting a surplus matters as much as training.`});
  }
  const streak=proteinStreak();
  if(streak>=3) recs.push({ic:'',h:`${streak}-day protein streak`,s:`You've hit protein ${streak} days running. Consistency is what drives results.`});
  if(recs.length===0) recs.push({ic:'',h:'You\'re on track',s:'Macros and hydration are looking good. Keep the momentum.'});
  return recs;
}
function proteinStreak(){
  let n=0; const d=new Date();
  for(let i=0;i<14;i++){ const key=isoDate(d); const t=dayTotals(key);
    if(t.kcal>0 && t.p>=S.targets.p*0.9) n++; else if(i>0) break;
    d.setDate(d.getDate()-1);
  } return n;
}
function coachHeadline(){
  const t=dayTotals(), g=S.targets, rem=g.kcal-t.kcal;
  const name=S.profile.name?`, ${S.profile.name.split(' ')[0]}`:'';
  if(t.kcal===0) return `Good ${dayPart()}${name}. Let's log your first meal and hit <b>${g.kcal.toLocaleString()} kcal</b> today.`;
  if(S.goal.type==='muscle') return `You've got <b>${rem} kcal</b> left to fuel growth. Prioritise your <b>${g.p}g</b> protein.`;
  if(rem<0) return `You're <b>${Math.abs(rem)} kcal</b> over — a short walk keeps today on plan.`;
  return `<b>${rem} kcal</b> and <b>${g.p-t.p>0?g.p-t.p:0}g protein</b> to go. You can lose <b>${weeklyLossEst()}kg</b> this week on track.`;
}
function weeklyLossEst(){ const d=tdee()-S.targets.kcal; return Math.max(0,(d*7/7700)).toFixed(1); }
function dayPart(){const h=new Date().getHours();return h<12?'morning':h<17?'afternoon':'evening';}

/* ======================= ENGINE: WEEKLY REPORT ========================== */
function weeklyReport(){
  const days=[]; const d=new Date();
  let kcal=0,burned=0,pHit=0,logged=0,water=0;
  for(let i=6;i>=0;i--){ const dd=new Date(); dd.setDate(d.getDate()-i); const key=isoDate(dd);
    const t=dayTotals(key); days.push({key,label:dd.toLocaleDateString(undefined,{weekday:'short'}),kcal:t.kcal});
    if(t.kcal>0){logged++; kcal+=t.kcal; burned+=t.burned; water+=t.water; if(t.p>=S.targets.p*0.9)pHit++;}
  }
  const wl=S.weightLog.slice(-8);
  let weightChange=null;
  if(wl.length>=2) weightChange=+(wl[wl.length-1].weight-wl[0].weight).toFixed(1);
  return {days, avgKcal:logged?Math.round(kcal/logged):0, burned, loggedDays:logged,
          proteinDays:pHit, avgWater:logged?Math.round(water/logged):0, weightChange, target:S.targets.kcal};
}

function hasKey(){ return !!(S.settings.apiKey && S.settings.apiKey.trim()); }
async function callClaude({system, messages, maxTokens=1024}){
  if(!hasKey()) throw new Error('NO_KEY');
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'content-type':'application/json',
      'x-api-key':S.settings.apiKey.trim(),
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body:JSON.stringify({model:S.settings.model||'claude-sonnet-5', max_tokens:maxTokens, system, messages}),
  });
  if(!res.ok){ const e=await res.text(); throw new Error('API '+res.status+': '+e.slice(0,160)); }
  const data=await res.json();
  return (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
}
function stripJSON(txt){ return txt.replace(/```json|```/g,'').trim(); }

async function analyzeMealPhoto(base64, mediaType){
  const sys='You are a nutrition vision estimator. Identify the food(s) in the image and estimate total nutrition for the visible portion. Egyptian and Middle-Eastern dishes are common. Respond ONLY with strict JSON, no prose: {"name":string,"kcal":number,"p":number,"c":number,"f":number,"fib":number,"note":string}. Numbers are grams except kcal.';
  const out=await callClaude({system:sys, maxTokens:400, messages:[{role:'user',content:[
    {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
    {type:'text',text:'Estimate the nutrition of this meal. Return JSON only.'}]}]});
  return JSON.parse(stripJSON(out));
}

/* ------------------------------ SVG CHARTS ------------------------------- */
function ring(pct, {size=120,stroke=12,color='var(--brand)',track='var(--card-2)'}={}){
  const r=(size-stroke)/2, c=2*Math.PI*r, p=Math.max(0,Math.min(1,pct));
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${track}" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c*(1-p)}"
      style="transition:stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)"/></svg>`;
}
function lineChart(points, {w=320,h=120,color='var(--brand)'}={}){
  if(points.length<2) return `<div class="empty"><div class="e-ic"></div><div class="muted">Log at least 2 weigh-ins to see your trend.</div></div>`;
  const vals=points.map(p=>p.v), min=Math.min(...vals), max=Math.max(...vals);
  const pad=8, span=(max-min)||1;
  const X=i=>pad+i*(w-2*pad)/(points.length-1);
  const Y=v=>pad+(1-(v-min)/span)*(h-2*pad);
  let d='', area='';
  points.forEach((p,i)=>{ const x=X(i),y=Y(p.v); d+=(i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' '; });
  area=`M${X(0)} ${h-pad} `+points.map((p,i)=>'L'+X(i).toFixed(1)+' '+Y(p.v).toFixed(1)).join(' ')+` L${X(points.length-1)} ${h-pad} Z`;
  const dots=points.map((p,i)=>`<circle cx="${X(i)}" cy="${Y(p.v)}" r="3" fill="${color}"/>`).join('');
  return `<svg class="chart" viewBox="0 0 ${w} ${h}">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${color}" stop-opacity=".25"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#lg)"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}</svg>`;
}
function barChart(days, target){
  const w=320,h=120,pad=10, max=Math.max(target*1.2, ...days.map(d=>d.kcal),1);
  const bw=(w-2*pad)/days.length*0.62, gap=(w-2*pad)/days.length;
  const ty=pad+(1-target/max)*(h-2*pad-14);
  let bars='';
  days.forEach((d,i)=>{ const bh=(d.kcal/max)*(h-2*pad-14); const x=pad+i*gap+(gap-bw)/2; const y=h-pad-bh-14;
    const col=d.kcal===0?'var(--card-2)':(Math.abs(d.kcal-target)<target*0.12?'var(--brand)':'var(--ink-3)');
    bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${Math.max(bh,2)}" rx="4" fill="${col}"/>
      <text x="${x+bw/2}" y="${h-3}" text-anchor="middle" font-size="9" fill="var(--ink-3)" font-weight="700">${d.label[0]}</text>`;
  });
  return `<svg class="chart" viewBox="0 0 ${w} ${h}">
    <line x1="${pad}" y1="${ty}" x2="${w-pad}" y2="${ty}" stroke="var(--brand)" stroke-width="1" stroke-dasharray="3 3" opacity=".6"/>
    <text x="${w-pad}" y="${ty-4}" text-anchor="end" font-size="9" fill="var(--brand)" font-weight="700">target</text>
    ${bars}</svg>`;
}

function sessionsThisWeek(){ const d=new Date(TODAY); const start=new Date(d); start.setDate(d.getDate()-((d.getDay()+6)%7)); start.setHours(0,0,0,0);
  return S.workoutLog.filter(l=> new Date(l.date)>=start).length; }
function workoutStreak(){ if(!S.workoutLog.length) return 0; let streak=0, cursor=new Date(TODAY);
  for(let i=0;i<26;i++){ const start=new Date(cursor); start.setDate(cursor.getDate()-((start.getDay()+6)%7)); start.setHours(0,0,0,0);
    const end=new Date(start); end.setDate(start.getDate()+7);
    const has=S.workoutLog.some(l=>{const t=new Date(l.date); return t>=start&&t<end;});
    if(has) streak++; else if(i>0) break; cursor.setDate(cursor.getDate()-7);
  } return streak; }

  const box=document.getElementById('chatBox'); const txt=(box.value||'').trim(); if(!txt) return;

/* best-effort local reminders (front-end only; fire while app is open) */
function scheduleReminders(){
  if(!('Notification'in window)||Notification.permission!=='granted') return;
  (window._remTimers||[]).forEach(clearTimeout); window._remTimers=[];
  const r=S.settings.reminders; if(!r||!r.on) return;
  const now=new Date();
  const fire=(title,body)=>{ try{ new Notification(title,{body}); }catch(e){} };
  const at=(hhmm,fn)=>{ if(!hhmm) return; const [h,m]=hhmm.split(':').map(Number); const t=new Date(); t.setHours(h,m,0,0);
    if(t>now) window._remTimers.push(setTimeout(fn, t-now)); };
  at(r.breakfast,()=>fire(' Breakfast','Log breakfast and get a head start on your '+S.targets.p+'g protein.'));
  at(r.lunch,()=>fire(' Lunch',dailyBrief()));
  at(r.dinner,()=>fire(' Dinner',dailyBrief()));
  at(r.brief,()=>fire(' Daily brief',dailyBrief()));
  if(r.water){ for(let h=10;h<=20;h+=2){ at(pad(h)+':00',()=>{ if(dayTotals().water<S.targets.water)
    fire(' Water','A glass now keeps you on track — '+((S.targets.water-dayTotals().water)/1000).toFixed(1)+'L to go.'); }); } }
}

/* ------------------------------ REST TIMER ALARM ------------------------- */
const Rest={sec:0, iv:null, running:false};
function fmtTime(s){ const m=Math.floor(s/60), ss=s%60; return m>0 ? m+':'+String(ss).padStart(2,'0') : ss+'s'; }
function renderRestWidget(){
  const el=document.getElementById('restWidget'); if(!el) return;
  const disp=Rest.running?Rest.sec:(S.settings.restSec||90);
  el.innerHTML=`<div class="card" style="text-align:center;padding:16px;margin-bottom:0">
    <div class="eyebrow" style="margin-bottom:6px">Rest between sets</div>
    <div class="tnum" style="font-size:46px;font-weight:800;line-height:1;color:${Rest.running?(Rest.sec<=5?'var(--danger)':'var(--brand)'):'var(--ink)'}">${fmtTime(disp)}</div>
    <div class="btn-row" style="margin-top:14px">
      <button class="btn sm" onclick="restAdj(-15)">−15s</button>
      <button class="btn sm primary" onclick="startRest()">${Rest.running?'Restart':'Start'}</button>
      <button class="btn sm" onclick="restAdj(15)">+15s</button></div>
    ${Rest.running?`<button class="btn sm ghost" style="margin-top:8px" onclick="stopRest()">Stop</button>`:''}</div>`;
}
function restAdj(d){ S.settings.restSec=Math.max(15,(S.settings.restSec||90)+d); save();
  if(Rest.running) Rest.sec=Math.max(1,Rest.sec+d); renderRestWidget(); }
function startRest(){ clearInterval(Rest.iv); Rest.sec=S.settings.restSec||90; Rest.running=true; renderRestWidget();
  Rest.iv=setInterval(()=>{ Rest.sec--;
    if(Rest.sec<=0){ clearInterval(Rest.iv); Rest.running=false; beep(); if(navigator.vibrate)navigator.vibrate([300,120,300]); toast(' Rest done — next set'); }
    const el=document.getElementById('restWidget'); el?renderRestWidget():clearInterval(Rest.iv);
  },1000);
}
function stopRest(){ clearInterval(Rest.iv); Rest.running=false; renderRestWidget(); }
function beep(){ try{ const A=window.AudioContext||window.webkitAudioContext; if(!A)return; const ctx=new A();
  const tone=(freq,start,dur)=>{ const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g); g.connect(ctx.destination);
    o.type='sine'; o.frequency.value=freq; g.gain.setValueAtTime(.0001,ctx.currentTime+start);
    g.gain.exponentialRampToValueAtTime(.5,ctx.currentTime+start+.02); g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+start+dur);
    o.start(ctx.currentTime+start); o.stop(ctx.currentTime+start+dur+.02); };
  tone(880,0,.5); tone(1175,.28,.5); tone(1568,.56,.6);
}catch(e){} }

  S.recovery[TODAY]={score:+g('recScore')||null, sleepH:+g('recSleep')||null, hrv:+g('recHrv')||null, rhr:+g('recRhr')||null, strain:+g('recStrain')||null, source:'manual'};
  save(); toast('Recovery saved — coaching updated'); closeSheet(); render();
}
async function whoopGet(path){
  const res=await fetch('https://api.prod.whoop.com'+path,{headers:{'Authorization':'Bearer '+S.settings.whoopToken}});
  if(!res.ok) throw new Error('HTTP '+res.status);
  return res.json();
}
/* pulls recovery + latest cycle (strain, active calories, avg HR). WHOOP has no step count. */
async function whoopAutoSync(throwErr){
  if(!S.settings.whoopToken) return false;
  let ok=false, err=null;
  try{ const rec=await whoopGet('/developer/v2/recovery?limit=1');
    const r0=(rec.records||rec.data||[])[0], sc=r0&&(r0.score||r0);
    if(sc&&sc.recovery_score!=null){ S.recovery[TODAY]=Object.assign({}, S.recovery[TODAY], {
      score:Math.round(sc.recovery_score), hrv:Math.round(sc.hrv_rmssd_milli||0)||null,
      rhr:Math.round(sc.resting_heart_rate||0)||null, source:'whoop'}); ok=true; }
  }catch(e){ err=e; }
  try{ const cyc=await whoopGet('/developer/v2/cycle?limit=1');
    const c0=(cyc.records||cyc.data||[])[0], cs=c0&&c0.score;
    if(cs){ if(!S.activity) S.activity={}; S.activity[TODAY]={
      cals:Math.round((cs.kilojoule||0)/4.184)||null, strain:cs.strain!=null?+(+cs.strain).toFixed(1):null,
      avgHr:Math.round(cs.average_heart_rate||0)||null, source:'whoop'}; ok=true; }
  }catch(e){ err=err||e; }
  if(ok){ save(); if(typeof CURRENT!=='undefined'&&CURRENT==='today'&&document.querySelector('.screen')) render(); }
  if(!ok && throwErr) throw (err||new Error('no data'));
  return ok;
}
async function whoopSync(){
  const tok=((document.getElementById('whoopTok')||{}).value||S.settings.whoopToken||'').trim();
  const msg=document.getElementById('whoopMsg'); if(!tok){ if(msg)msg.textContent='Add a token first.'; return; }
  S.settings.whoopToken=tok; save(); if(msg) msg.innerHTML='<span class="loader"></span> Syncing WHOOP…';
  try{ await whoopAutoSync(true);
    if(msg) msg.innerHTML='Synced Recovery & activity updated. It will now auto-sync every time you open the app.';
    toast('WHOOP synced'); setTimeout(()=>{closeSheet();render();},1000);
  }catch(e){ if(msg) msg.innerHTML=`Couldn't reach WHOOP from the browser (${e.message}). This is expected — browsers block WHOOP's API directly (its OAuth + token exchange need a server). Enter today's numbers manually below; the hosted/native build syncs automatically.`; }
}

  {id:'f_pb',    name:'Peanut butter', cat:'fat', per:'unit', unit:'tbsp', ug:16, kcal:95,p:4,c:3,f:8},
  {id:'f_avo',   name:'Avocado', cat:'fat', per:'100g', kcal:160,p:2,c:9,f:15},
  {id:'f_tahini',name:'Tahini', cat:'fat', per:'unit', unit:'tbsp', ug:15, kcal:89,p:2.6,c:3.2,f:8},
  // veg
  {id:'v_salad', name:'Mixed salad', cat:'veg', per:'100g', kcal:25,p:1.5,c:4,f:0.3},
  {id:'v_broc',  name:'Broccoli', cat:'veg', per:'100g', kcal:34,p:2.8,c:7,f:0.4},
];
function mfind(id){ return MEALDB.find(x=>x.id===id); }
function macroOf(comp, grams){ // grams for per100; for unit, grams is a count
  if(comp.per==='unit'){ const n=grams; return {kcal:comp.kcal*n, p:comp.p*n, c:comp.c*n, f:comp.f*n}; }
  const k=grams/100; return {kcal:comp.kcal*k, p:comp.p*k, c:comp.c*k, f:comp.f*k};
}
/* pick component pools honouring diet + veg pref */
function mealPools(){
  const diet=S.goal.diet, veg=diet==='vegetarian';
  const prot=MEALDB.filter(x=>x.cat==='protein' && (!veg || x.veg));
  const carb=MEALDB.filter(x=>(x.cat==='carb'||x.cat==='fruit') && (diet!=='lowcarb' || x.cat==='fruit'||x.id==='c_oats'));
  const fat =MEALDB.filter(x=>x.cat==='fat');
  const vegP=MEALDB.filter(x=>x.cat==='veg');
  return {prot,carb,fat,vegP};
}
let PLAN_SEED=0;
function generateDayPlan(){
  const t=S.targets; const n=Math.min(5,Math.max(3,S.goal.meals||4));
  const slots = n===3?['Breakfast','Lunch','Dinner']
             : n===4?['Breakfast','Lunch','Snack','Dinner']
             : ['Breakfast','Snack','Lunch','Snack','Dinner'];
  const kShare = n===3?[.30,.38,.32] : n===4?[.26,.34,.12,.28] : [.22,.10,.28,.10,.30];
  const {prot,carb,fat,vegP}=mealPools();
  const isLean=p=> (p.p/Math.max(p.kcal,1))>=0.14 && (p.f*9/Math.max(p.kcal,1))<0.30;
  const leanPool=(prot.filter(isLean).length?prot.filter(isLean):prot);
  const rot=(arr,i)=>arr[((i%arr.length)+PLAN_SEED)%arr.length];
  const gramsFor=(comp,need,key,min)=>Math.max(min,Math.round(need/comp[key]*100/5)*5);

  // pass 1 — protein anchor + carbs + veg
  const meals=slots.map((slot,i)=>{
    const mp=t.p/n, mc=t.c*kShare[i]; const items=[];
    if(slot==='Breakfast'){
      const eggs=Math.min(3,Math.max(2,Math.round(mp*0.35/6.3)));
      items.push({c:mfind('m_egg'),amt:eggs,anchor:true});
      const rem=mp-eggs*6.3, yog=mfind('m_yog');
      if(rem>4) items.push({c:yog,amt:gramsFor(yog,rem,'p',50),anchor:true});
    } else {
      const P=rot(leanPool,i);
      if(P.per==='unit') items.push({c:P,amt:Math.max(1,Math.round(mp/P.p)),anchor:true});
      else items.push({c:P,amt:gramsFor(P,mp,'p',60),anchor:true});
    }
    const carbAlready=items.reduce((a,it)=>a+macroOf(it.c,it.amt).c,0);
    const needC=mc-carbAlready;
    const C=(slot==='Breakfast')?mfind('c_oats'):rot(carb,i+2);
    if(needC>4){ if(C.per==='unit') items.push({c:C,amt:Math.max(1,Math.round(needC/C.c))});
      else items.push({c:C,amt:gramsFor(C,needC,'c',20)}); }
    if(slot==='Lunch'||slot==='Dinner') items.push({c:rot(vegP,i),amt:150});
    return {slot,items,k:kShare[i]};
  });

  const totals=()=>meals.reduce((T,m)=>{m.items.forEach(it=>{const x=macroOf(it.c,it.amt);T.kcal+=x.kcal;T.p+=x.p;T.c+=x.c;T.f+=x.f;});return T;},{kcal:0,p:0,c:0,f:0});
  const sumFat=()=>meals.reduce((a,m)=>a+m.items.reduce((b,it)=>b+macroOf(it.c,it.amt).f,0),0);
  const scale=(it,f,min)=>it.amt=(it.c.per==='unit')?Math.max(1,Math.round(it.amt*f)):Math.max(min,Math.round(it.amt*f/5)*5);

  // pass 2 — seed a fat source per meal, then correct to hit the fat target exactly
  let remF=t.f-sumFat();
  if(remF>2) meals.forEach((m,i)=>{ const add=remF*m.k; if(add<3)return; const F=rot(fat,i);
    if(F.per==='unit') m.items.push({c:F,amt:Math.max(1,Math.round(add/F.f)),fatsrc:true});
    else m.items.push({c:F,amt:gramsFor(F,add,'f',5),fatsrc:true}); });

  // pass 3 — scale protein anchors so day protein hits target (carbs/dairy/nuts also add protein)
  let d=totals();
  const anchors=[]; meals.forEach(m=>m.items.forEach(it=>{if(it.anchor)anchors.push(it);}));
  const aP=anchors.reduce((a,it)=>a+macroOf(it.c,it.amt).p,0), otherP=d.p-aP;
  if(aP>0){ const f=Math.max(.45,Math.min(1.6,(t.p-otherP)/aP)); anchors.forEach(it=>scale(it,f,40)); }

  // pass 4 — correct fat source portions to residual fat need
  const fats=[]; meals.forEach(m=>m.items.forEach(it=>{if(it.fatsrc)fats.push(it);}));
  const fF=fats.reduce((a,it)=>a+macroOf(it.c,it.amt).f,0), needF=t.f-(sumFat()-fF);
  if(fats.length&&fF>0){ const f=Math.max(.2,Math.min(2.4,needF/fF)); fats.forEach(it=>scale(it,f,5)); }

  // pass 5 — close the calorie gap by scaling carb portions
  d=totals(); const gap=t.kcal-d.kcal;
  if(Math.abs(gap)>50){
    const carbs=[]; meals.forEach(m=>m.items.forEach(it=>{if(it.c.cat==='carb'&&it.c.per!=='unit')carbs.push(it);}));
    const ck=carbs.reduce((a,it)=>a+macroOf(it.c,it.amt).kcal,0);
    if(ck>0){ const f=Math.max(.35,Math.min(2.2,(ck+gap)/ck)); carbs.forEach(it=>it.amt=Math.max(15,Math.round(it.amt*f/5)*5)); }
  }
  d=totals();
  return {meals, totals:{kcal:Math.round(d.kcal),p:Math.round(d.p),c:Math.round(d.c),f:Math.round(d.f)}, target:t};
}
/* portion label with cooked/raw awareness */
function portionLabel(it){
  const c=it.c, amt=it.amt;
  if(c.per==='unit'){ const unit=c.unit+(amt>1?(c.unit.endsWith('h')?'es':'s'):''); return `${amt} ${unit}`; }
  // grams
  if(c.meat){
    const cookedG=amt, rawG=Math.round(cookedG*c.raw/5)*5;
    return (S.settings.meatState==='raw')
      ? `${rawG}g raw <span class="muted">(≈${cookedG}g cooked)</span>`
      : `${cookedG}g cooked <span class="muted">(≈${rawG}g raw)</span>`;
  }
  if(c.dry){ const dryG=Math.round(amt*c.dry/5)*5; return `${amt}g cooked <span class="muted">(≈${dryG}g dry)</span>`; }
  if(c.state==='dry'){ return `${amt}g dry`; }
  return `${amt}g`;
}
function mealTotals(m){ return m.items.reduce((T,it)=>{const x=macroOf(it.c,it.amt);T.kcal+=x.kcal;T.p+=x.p;T.c+=x.c;T.f+=x.f;return T;},{kcal:0,p:0,c:0,f:0}); }

/* logging a generated plan into today's food log as custom entries */
function logMeal(mi){
  const m=CUR_DAYPLAN.meals[mi]; const l=dayLog();
  m.items.forEach(it=>{ const x=macroOf(it.c,it.amt);
    l.foods.push({custom:{name:it.c.name+' · '+portionLabel(it).replace(/<[^>]+>/g,''), kcal:Math.round(x.kcal),p:+x.p.toFixed(1),c:+x.c.toFixed(1),f:+x.f.toFixed(1),fib:0}, qty:1, meal:m.slot}); });
  save(); toast(m.slot+' logged'); render();
}
function logDayPlan(){
  CUR_DAYPLAN.meals.forEach((m,i)=>logMealSilent(i)); save(); toast('Full day logged to your diary'); closeSheet(); switchTab('nutrition');
}
function logMealSilent(mi){ const m=CUR_DAYPLAN.meals[mi]; const l=dayLog();
  m.items.forEach(it=>{ const x=macroOf(it.c,it.amt);
    l.foods.push({custom:{name:it.c.name+' · '+portionLabel(it).replace(/<[^>]+>/g,''), kcal:Math.round(x.kcal),p:+x.p.toFixed(1),c:+x.c.toFixed(1),f:+x.f.toFixed(1),fib:0}, qty:1, meal:m.slot}); }); }
function setMeatState(s){ S.settings.meatState=s; save(); openMealPlanner(); }

</script>
